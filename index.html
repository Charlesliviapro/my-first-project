<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My First Semantic Project</title>

  <style>
    /* Basic reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Page base */
    body {
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
      color: #1f2937;
      background: #f3f4f6;
      padding: 24px;
    }

    /* Layout spacing */
    header,
    main,
    footer {
      max-width: 900px;
      margin: 0 auto;
    }

    /* Header */
    header {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #111827;
    }

    header p {
      color: #6b7280;
    }

    /* Main content */
    main {
      margin-top: 18px;
      display: grid;
      gap: 18px;
    }

    section {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
    }

    section h2 {
      font-size: 1.25rem;
      margin-bottom: 10px;
      color: #111827;
    }

    section p {
      color: #374151;
    }

    /* List */
    ul {
      margin-left: 20px;
    }

    li {
      margin: 8px 0;
    }

    /* Footer */
    footer {
      margin-top: 18px;
      text-align: center;
      color: #6b7280;
      font-size: 0.95rem;
    }

    footer p {
      padding: 10px 0;
    }
  </style>
</head>
<body>

  <header>
    <h1>My First Mini Project</h1>
    <p>Learning Semantic HTML & CSS</p>
  </header>

  <main>
    <section>
      <h2>About Me</h2>
      <p>
        I am learning frontend development step by step.
        This project helps me understand semantic HTML.
      </p>
    </section>

    <section>
      <h2>What I Am Learning</h2>
      <ul>
        <li>Semantic HTML</li>
        <li>CSS Basics</li>
        <li>Git & GitHub</li>
      </ul>
    </section>
  </main>

  <footer>
    <p>© 2026 My First Project</p>
  </footer>

</body>
</html>
